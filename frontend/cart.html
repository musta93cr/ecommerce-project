<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>panier</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>

    </header>
    <main>
        <section class="cart">
          <div class="container">
            <h1>Votre Panier</h1>
            <div class="cart-items">
                <div class="cart-item">
                    <img src="assets/img/product1.jpg" alt="Produit 1">
                        <h3>Iphone </h3>
                        <p>Prix : 999 €</p>
                        <p><span>Quantité : 2</span></p>
                        <div class="cart-actions">
                          <button>+</button>
                          <button>-</button>
                          <button>Supprimer</button>
                        </div>
                </div>
                <div class="cart-item">
                    <img src="assets/img/product2.jpg" alt="Produit 2">
                        <h3>MacBook</h3>
                        <p>Prix : 1299 €</p>
                        <p><span>Quantité : 1</span></p>
                        <div class="cart-actions">
                          <button>+</button>
                          <button>-</button>
                          <button>Supprimer</button>
                        </div>
                </div>
                <div class="cart-total">
                    <p>Total : 1398 €</p>
                    <button>Passer commande</button>  

                </div>
            </div>
          </div>
           
        </section>

    </main>
    <footer>

    </footer>

    
</body>
</html>
