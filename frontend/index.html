<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-commerce</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <h1>ShopNow</h1>
            </div>
            <nav>
                <ul>
                    <li><a href="#">Accueil</a></li>
                    <li><a href="#">Produits</a></li>
                    <li><a href="#">Catégories</a></li>
                    <li><a href="#">Contact</a></li>
                </ul>
            </nav>
            <div class="header-actions">
                <input type="text" placeholder="Rechercher un produit...">
                <button>Rechercher</button>
            </div>
        </div>
    </header>
    <main>
        <section class="hero">
            <div class="container">
              <div class="hero-content">    
                 <h2>Découvrez les meilleures offres</h2>
                 <p>Des milliers de produits aux meilleurs prix livrés à domicile !</p>
                 <button>Voir les produits</button>
              </div>
            </div>
        </section>
        <section class="catégories">
            <div class="container">
                <h2>Nos catégories </h2>
                <div class="catégorie-grid">
                     <div class="category-card">
                            <h3>Téléphones</h3>
                     </div>
                <div class="category-card">
                            <h3>Informatique</h3>
                </div>
                        <div class="category-card">
                            <h3>Mode</h3>
                        </div>
                        <div class="category-card">
                            <h3>Ordinateurs</h3>
                        </div>
                        </div>
                    </div>
        
                            
                        </div>
                     
                        <div class="category-card">
                            <h3>Électronique</h3>
                            
                        </div>
                    </div>
                    <div class="catégorie">
                        <h3>Mode</h3>
                       
                    </div>
                    <div class="catégorie">
                        <h3>Audio</h3>
                        
                    </div>
                </div>
            </div>
        </section>
    </main>
    <footer>

    </footer>
    <script src="script.js"></script>

</body>
</html>
